<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SaveWell — Color Palette Exploration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --page-bg: #f8f7f5;
        --page-text: #4d5753;
        --page-heading: #243837;
        --page-muted: #697568;
        --page-border: #dce2dd;
        --page-surface: #f2f4f2;
        --page-primary: #0b7a7c;
      }

      html { font-size: 16px; -webkit-font-smoothing: antialiased; }
      body { background: var(--page-bg); color: var(--page-text); font-family: 'Nunito', system-ui, sans-serif; line-height: 1.6; }

      .page-header {
        max-width: 1200px;
        margin: 0 auto;
        padding: 3rem 2rem 0.5rem;
      }
      .page-header .tag {
        display: inline-block;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--page-primary);
        margin-bottom: 0.75rem;
      }
      .page-header h1 {
        font-family: 'Bitter', Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--page-heading);
        letter-spacing: -0.01em;
        margin-bottom: 0.5rem;
      }
      .page-header p {
        font-size: 1.0625rem;
        color: var(--page-muted);
        max-width: 58ch;
        line-height: 1.65;
      }

      .controls {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.25rem 2rem 0;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .controls button {
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        padding: 0.4rem 0.85rem;
        border-radius: 999px;
        border: 1px solid var(--page-border);
        background: white;
        color: var(--page-muted);
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .controls button:hover, .controls button.active {
        background: var(--page-primary);
        color: white;
        border-color: var(--page-primary);
      }

      .palette-grid {
        max-width: 1200px;
        margin: 1.5rem auto 4rem;
        padding: 0 2rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1.25rem;
      }

      .pal-card {
        background: white;
        border-radius: 1rem;
        overflow: hidden;
        border: 1px solid var(--page-border);
        position: relative;
        transition: box-shadow 0.2s ease;
      }
      .pal-card:hover {
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      }

      /* Mini homepage snapshot */
      .mini-site {
        font-size: 10px;
        line-height: 1.4;
        overflow: hidden;
      }

      .mini-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6em 1.4em;
      }
      .mini-nav-logo {
        font-family: 'Bitter', serif;
        font-weight: 700;
        font-size: 1.2em;
      }
      .mini-nav-links {
        display: flex;
        gap: 1em;
        font-size: 0.85em;
        opacity: 0.6;
      }

      .mini-hero {
        padding: 2em 1.4em 2.2em;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 1.5em;
        align-items: center;
      }
      .mini-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35em;
        padding: 0.3em 0.65em;
        border-radius: 999px;
        font-size: 0.8em;
        font-weight: 600;
        margin-bottom: 0.6em;
      }
      .mini-badge svg { width: 0.9em; height: 0.9em; flex-shrink: 0; }
      .mini-hero h2 {
        font-family: 'Bitter', Georgia, serif;
        font-size: 1.8em;
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.01em;
        margin-bottom: 0.4em;
      }
      .mini-hero-sub {
        font-size: 0.95em;
        line-height: 1.6;
        margin-bottom: 1em;
      }
      .mini-hero-actions { display: flex; gap: 0.5em; }
      .mini-btn {
        padding: 0.5em 1em;
        border-radius: 0.6em;
        font-size: 0.85em;
        font-weight: 700;
        text-align: center;
        white-space: nowrap;
      }
      .mini-hero-img { display: flex; align-items: center; justify-content: center; }
      .mini-hero-img-placeholder {
        width: 7em;
        height: 8em;
        border-radius: 1em;
        opacity: 0.18;
      }
      .mini-trust {
        display: flex;
        gap: 1em;
        margin-top: 0.8em;
        font-size: 0.75em;
      }
      .mini-trust span { display: flex; align-items: center; gap: 0.3em; }
      .mini-trust svg { width: 1em; height: 1em; }

      .mini-promise {
        padding: 1.6em 1.4em;
      }
      .mini-promise h3 {
        font-family: 'Bitter', Georgia, serif;
        font-size: 1.3em;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 0.4em;
      }
      .mini-promise-sub {
        font-size: 0.85em;
        margin-bottom: 1em;
        line-height: 1.55;
      }
      .mini-promise-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6em;
      }
      .mini-promise-item { display: flex; gap: 0.5em; align-items: flex-start; }
      .mini-promise-icon {
        width: 2em;
        height: 2em;
        border-radius: 0.4em;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .mini-promise-icon svg { width: 1em; height: 1em; }
      .mini-promise-item-title { font-weight: 700; font-size: 0.85em; line-height: 1.3; }

      .mini-cta {
        padding: 1.2em 1.4em;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .mini-cta h4 {
        font-family: 'Bitter', Georgia, serif;
        font-size: 1.1em;
        font-weight: 700;
      }
      .mini-cta-btn {
        padding: 0.45em 0.9em;
        border-radius: 0.5em;
        font-size: 0.8em;
        font-weight: 700;
      }

      .pal-footer {
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        border-top: 1px solid var(--page-border);
      }
      .pal-num {
        font-family: 'Bitter', serif;
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--page-border);
        min-width: 2rem;
      }
      .pal-swatches { display: flex; gap: 3px; flex: 1; }
      .pal-swatch {
        flex: 1;
        height: 1.75rem;
        border-radius: 4px;
        position: relative;
      }
      .pal-swatch:first-child { border-radius: 4px 2px 2px 4px; }
      .pal-swatch:last-child { border-radius: 2px 4px 4px 2px; }
      .pal-name {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--page-muted);
        white-space: nowrap;
      }

      .fav-btn {
        width: 2rem; height: 2rem;
        border: none; background: none; cursor: pointer;
        color: var(--page-border);
        transition: color 0.15s ease;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%; flex-shrink: 0;
      }
      .fav-btn:hover { color: var(--page-primary); background: var(--page-surface); }
      .fav-btn.favorited { color: oklch(0.55 0.18 25); }
      .fav-btn svg { width: 1rem; height: 1rem; }

      /* Token readout */
      .pal-tokens {
        padding: 0 1.25rem 0.75rem;
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .pal-token {
        font-size: 0.625rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        padding: 0.15rem 0.4rem;
        border-radius: 3px;
        border: 1px solid var(--page-border);
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }
      .pal-token-swatch {
        width: 0.6rem;
        height: 0.6rem;
        border-radius: 2px;
        flex-shrink: 0;
      }

      @media (max-width: 720px) {
        .page-header, .controls { padding-left: 1.25rem; padding-right: 1.25rem; }
        .palette-grid { padding: 0 1rem; grid-template-columns: 1fr; }
      }
    </style>

        { n:30, name:"Rose Gradient",           colors:["#590d22","#800f2f","#a4133c","#c9184a","#ff4d6d","#ff758f","#ff8fa3","#ffb3c1","#ffccd5","#fff0f3"], extended:true },

      // ---- Color utilities ----
      function hexToRgb(hex) {
        const h = hex.replace('#','');
        return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
      }

      function luminance(hex) {
        const [r,g,b] = hexToRgb(hex).map(c => { c /= 255; return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); });
        return 0.2126*r + 0.7152*g + 0.0722*b;
      }

      function isLight(hex) { return luminance(hex) > 0.35; }

      function contrastRatio(hex1, hex2) {
        const l1 = luminance(hex1), l2 = luminance(hex2);
        const lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
        return (lighter + 0.05) / (darker + 0.05);
      }

      // Perceived saturation (simple HSL-based)
      function saturation(hex) {
        const [r,g,b] = hexToRgb(hex).map(c => c/255);
        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        if (max === min) return 0;
        const l = (max+min)/2;
        return l > 0.5 ? (max-min)/(2-max-min) : (max-min)/(max+min);
      }

      // Mix two hex colors
      function mixHex(hex1, hex2, weight) {
        const [r1,g1,b1] = hexToRgb(hex1);
        const [r2,g2,b2] = hexToRgb(hex2);
        const w = weight;
        const r = Math.round(r1*w + r2*(1-w));
        const g = Math.round(g1*w + g2*(1-w));
        const b = Math.round(b1*w + b2*(1-w));
        return '#' + [r,g,b].map(c => Math.min(255,Math.max(0,c)).toString(16).padStart(2,'0')).join('');
      }

      // Lighten a color toward white
      function lighten(hex, amount) { return mixHex('#ffffff', hex, amount); }

      // Darken a color toward black
      function darken(hex, amount) { return mixHex('#000000', hex, amount); }

      /*
       * Smart theme derivation.
       *
       * Strategy: SaveWell is a light-mode healthcare site for 65+ users.
       * We need:
       *   --bg:         very light (luminance > 0.85)
       *   --bg-alt:     slightly different from bg
       *   --bg-subtle:  tinted light tone for badges/icons
       *   --primary:    mid-range, saturated, good contrast on white (~4.5:1+)
       *   --primary-dark: darker variant for hover/CTA
       *   --accent:     secondary color, different hue from primary
       *   --heading:    very dark, high contrast on bg
       *   --text:       dark but softer than heading
       *   --text-muted: lighter text for secondary info
       *   --border:     light gray, tinted toward primary
       */
      function deriveTheme(colors) {
        // Work with first 5-7 colors max
        const c = colors.slice(0, Math.min(colors.length, 7));

        // Sort all by luminance
        const byLum = [...c].sort((a,b) => luminance(b) - luminance(a));

        // Sort by saturation
        const bySat = [...c].sort((a,b) => saturation(b) - saturation(a));

        // 1. Find the best PRIMARY: most saturated color with good contrast on white
        let primary = null;
        for (const col of bySat) {
          if (contrastRatio(col, '#ffffff') >= 3.0 && saturation(col) > 0.15) {
            primary = col;
            break;
          }
        }
        // Fallback: darkest saturated color
        if (!primary) {
          const darkSaturated = bySat.filter(c => luminance(c) < 0.4);
          primary = darkSaturated[0] || byLum[byLum.length - 1];
        }

        // 2. Find ACCENT: second most saturated, different enough from primary
        let accent = null;
        for (const col of bySat) {
          if (col === primary) continue;
          const lDiff = Math.abs(luminance(col) - luminance(primary));
          if (saturation(col) > 0.1 && (lDiff > 0.1 || bySat.indexOf(col) > 0)) {
            accent = col;
            break;
          }
        }
        if (!accent) accent = primary;

        // 3. HEADING: darkest color in the palette
        const heading = byLum[byLum.length - 1];

        // 4. BG: lightest color. If it's not light enough, lighten it.
        let bg = byLum[0];
        if (luminance(bg) < 0.75) bg = lighten(bg, 0.88);

        // 5. BG-ALT: second lightest, or derive from bg
        let bgAlt = byLum.length > 1 ? byLum[1] : bg;
        if (luminance(bgAlt) < 0.7) bgAlt = lighten(primary, 0.92);
        // Make sure bg and bgAlt are visibly different
        if (Math.abs(luminance(bg) - luminance(bgAlt)) < 0.03) {
          bgAlt = darken(bg, 0.06);
        }

        // 6. BG-SUBTLE: lightly tinted toward primary
        const bgSubtle = lighten(primary, 0.88);

        // 7. PRIMARY-DARK: darken primary
        const primaryDark = darken(primary, 0.25);

        // 8. TEXT: derive from heading, slightly lighter
        let text = heading;
        if (contrastRatio(heading, bg) > 12) {
          text = lighten(heading, 0.25);
        }

        // 9. TEXT-MUTED: lighter still
        const textMuted = lighten(heading, 0.4);

        // 10. BORDER: very light, tinted toward primary
        const border = lighten(primary, 0.82);

        // 11. CTA section
        const ctaBg = primaryDark;
        const ctaText = bg;
        const ctaTextMuted = lighten(primary, 0.7);

        // Ensure key contrasts meet WCAG AA
        // primary on bg: needs 4.5:1 for text, 3:1 for large text
        let finalPrimary = primary;
        let attempts = 0;
        while (contrastRatio(finalPrimary, bg) < 3.0 && attempts < 10) {
          finalPrimary = darken(finalPrimary, 0.1);
          attempts++;
        }

        return {
          bg, bgAlt, bgSubtle, border,
          primary: finalPrimary, primaryDark,
          accent: contrastRatio(accent, bg) < 3 ? darken(accent, 0.2) : accent,
          heading, text, textMuted,
          ctaBg, ctaText, ctaTextMuted
        };
      }

            <div class="mini-promise-grid">
              <div class="mini-promise-item">
                <div class="mini-promise-icon" style="background:${t.bgSubtle};color:${t.primary};">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12"/><path d="M15 9.5c0-1.5-1.5-2.5-3-2.5s-3 1-3 2.5 1.5 2 3 2.5 3 1 3 2.5-1.5 2.5-3 2.5-3-1-3-2.5"/></svg>
                </div>
                <div class="mini-promise-item-title" style="color:${t.heading};">No fees, ever</div>
              </div>
              <div class="mini-promise-item">
                <div class="mini-promise-icon" style="background:${t.bgSubtle};color:${t.primary};">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                </div>
                <div class="mini-promise-item-title" style="color:${t.heading};">Trusted doctors</div>
              </div>
              <div class="mini-promise-item">
                <div class="mini-promise-icon" style="background:${t.bgSubtle};color:${t.primary};">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
                </div>
                <div class="mini-promise-item-title" style="color:${t.heading};">Auto rewards</div>
              </div>
              <div class="mini-promise-item">
                <div class="mini-promise-icon" style="background:${t.bgSubtle};color:${t.primary};">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </div>
                <div class="mini-promise-item-title" style="color:${t.heading};">Medicare unchanged</div>
              </div>
            </div>
          </div>
          <div class="mini-cta" style="background:${t.ctaBg};color:${t.ctaText};">
            <h4>Ready to start saving?</h4>
            <div class="mini-cta-btn" style="background:${t.bg};color:${t.primaryDark};">Search Providers</div>
          </div>
        `;
      }

      function tokenReadout(t) {
        const tokens = [
          ['bg', t.bg], ['bg-alt', t.bgAlt], ['primary', t.primary],
          ['heading', t.heading], ['text', t.text], ['accent', t.accent]
        ];
        return tokens.map(([name, color]) =>
          `<span class="pal-token"><span class="pal-token-swatch" style="background:${color};"></span>${name}</span>`
        ).join('');
      }

      // ---- Favorites ----
      const favs = new Set(JSON.parse(localStorage.getItem("sw-color-favs2") || "[]"));
      function saveFavs() { localStorage.setItem("sw-color-favs2", JSON.stringify([...favs])); }

      function render(filter) {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        let list;
        if (filter === "favorites") list = PALETTES.filter(p => favs.has(p.n));
        else if (filter === "5") list = PALETTES.filter(p => !p.extended);
        else if (filter === "large") list = PALETTES.filter(p => p.extended);
        else list = PALETTES;

        if (filter === "favorites" && list.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;padding:3rem;color:var(--page-muted);font-size:1.0625rem;">No favorites yet. Click the heart icon to save palettes.</div>';
          return;
        }

        list.forEach(p => {
          const theme = deriveTheme(p.colors);
          const card = document.createElement("div");
          card.className = "pal-card";

          const swatches = p.colors.map(c => `<div class="pal-swatch" style="background:${c};" title="${c}"></div>`).join('');

          card.innerHTML = `
            <div class="mini-site">${miniSiteHTML(theme)}</div>
            <div class="pal-tokens">${tokenReadout(theme)}</div>
            <div class="pal-footer">
              <span class="pal-num">${String(p.n).padStart(2,'0')}</span>
              <div class="pal-swatches">${swatches}</div>
              <span class="pal-name">${p.name}</span>
              <button class="fav-btn ${favs.has(p.n) ? 'favorited' : ''}" data-num="${p.n}" aria-label="Toggle favorite">
                <svg viewBox="0 0 24 24" fill="${favs.has(p.n) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
              </button>
            </div>
          `;
          grid.appendChild(card);
        });

        grid.querySelectorAll(".fav-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const num = parseInt(btn.dataset.num);
            if (favs.has(num)) favs.delete(num); else favs.add(num);
            saveFavs();
            render(currentFilter);
          });
        });
      }

      let currentFilter = "all";
      document.querySelectorAll(".controls button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          render(currentFilter);
        });
      });

      render("all");
    </script>
  </body>
</html>
